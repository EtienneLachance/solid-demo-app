name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm build
      - name: Type check
        run: pnpm run tsc
      - name: Lint & Prettier
        run: pnpm run lint:fix:prettier

  chromatic:
    if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch'
    needs: ci-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install
      - name: Build Storybook
        run: pnpm run build-storybook
      - name: Publish to Chromatic (auto-accept changes)
        run: pnpx chromatic --project-token=chpt_feeba3cebf08e9a --auto-accept-changes
